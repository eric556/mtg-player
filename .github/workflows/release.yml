name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache build dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-windows-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: deps-windows-

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mtg-sim-windows
          path: build/bin/Release/mtg-sim.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxrandr-dev libxcursor-dev \
            libxi-dev libudev-dev libgl-dev

      - name: Cache build dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-linux-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: deps-linux-

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mtg-sim-linux
          path: build/bin/mtg-sim

  release:
    needs: [build-windows, build-linux]
    if: always() && (needs.build-windows.result == 'success' || needs.build-linux.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download available artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mtg-sim-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mtg-sim-*/*
          generate_release_notes: true
